  <path d="M13 40 Q13 28 13 20" stroke="black" stroke-width="2"   stroke-linecap="round" fill="none"/>
  <path d="M16 40 Q17 32 18 24" stroke="black" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <!-- Center tuft (tallest) -->
  <path d="M21 40 Q20 26 20 14" stroke="black" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <path d="M24 40 Q24 22 24 10" stroke="black" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M27 40 Q28 26 28 14" stroke="black" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <!-- Right tuft -->
  <path d="M32 40 Q31 32 30 24" stroke="black" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <path d="M35 40 Q35 28 35 20" stroke="black" stroke-width="2"   stroke-linecap="round" fill="none"/>
  <path d="M38 40 Q39 32 40 24" stroke="black" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <!-- Ground line -->
